<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolita Pro Master - Consola Global Elite v8.8</title>
    <style>
        :root { --neon: #00ff41; --dark: #050505; --panel: #0d1117; --win: #ffeb3b; --error: #ff3333; }
        body { font-family: 'Segoe UI', monospace; background: var(--dark); color: var(--neon); margin: 0; padding: 10px; -webkit-user-select: none; user-select: none; }
        .container { max-width: 480px; margin: auto; border: 1px solid var(--neon); padding: 15px; border-radius: 8px; box-sizing: border-box; }
        h2 { font-size: 0.8rem; text-align: center; border-bottom: 1px solid var(--neon); padding-bottom: 8px; text-transform: uppercase; margin-bottom: 15px; }
        
        .main-form, .login-form { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select, textarea { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 10px; font-family: monospace; font-size: 0.9rem; border-radius: 4px; box-sizing: border-box; width: 100%; }
        input:focus, select:focus, textarea:focus { outline: none; background: #0a140a; }
        
        .btn { background: var(--neon); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; transition: 0.2s; }
        .btn:hover { background: #00cc33; box-shadow: 0 0 10px var(--neon); }
        .btn:disabled { background: #333 !important; color: #666 !important; cursor: not-allowed; box-shadow: none !important; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; text-align: center; }
        .stat-card { border: 1px solid var(--neon); padding: 10px; background: var(--panel); border-radius: 4px; }
        .stat-card h4 { margin: 0 0 5px 0; font-size: 0.65rem; text-transform: uppercase; color: #888; }
        .stat-card p { margin: 0; font-size: 1.4rem; font-weight: bold; color: var(--win); }

        .cal-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; margin-bottom: 10px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .cal-header { font-size: 0.65rem; color: #888; font-weight: bold; text-transform: uppercase; padding-bottom: 5px; }
        
        .cal-day { border: 1px solid #222; background: #080808; padding: 4px 2px; border-radius: 4px; min-height: 48px; display: flex; flex-direction: column; justify-content: space-between; position: relative; cursor: pointer; }
        .cal-day:hover { border-color: var(--neon); }
        .cal-day .day-num { font-size: 0.65rem; color: #666; text-align: left; padding-left: 2px; }
        .cal-day.today { border-color: var(--win); background: #141400; }
        .cal-day.today .day-num { color: var(--win); font-weight: bold; }
        
        .day-tiros { display: flex; flex-direction: column; gap: 2px; margin-top: 2px; }
        .t-mini { font-size: 0.65rem; font-weight: bold; padding: 1px 2px; border-radius: 2px; text-align: center; line-height: 1; }
        .t-mini.tarde { background: rgba(0,255,65,0.15); color: var(--neon); }
        .t-mini.noche { background: rgba(255,235,59,0.15); color: var(--win); }

        #admin-panel { border: 1px dashed var(--win); padding: 12px; margin-top: 20px; background: rgba(255,235,59,0.02); border-radius: 4px; }
        .user-row { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 6px 10px; margin-top: 5px; border-radius: 4px; font-size: 0.8rem; border: 1px solid #222; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 10px; box-sizing: border-box; }
        .modal-content { background: var(--panel); border: 1px solid var(--neon); padding: 20px; border-radius: 8px; width: 100%; max-width: 360px; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
    </style>
</head>
<body>

<div class="container">
    <h2>Bolita Pro Master <span style="font-size:0.6rem; color:#888; float:right;">v8.8</span></h2>

    <div id="login-section">
        <div class="login-form">
            <input type="text" id="login-user" placeholder="Usuario">
            <input type="password" id="login-pass" placeholder="Contraseña">
            <button onclick="intentarLogin()" class="btn">Acceder al Sistema</button>
        </div>
        <div style="text-align: center; margin-top: 5px;">
            <span onclick="mostrarRegistroForm(true)" style="font-size:0.75rem; color:#888; cursor:pointer; text-decoration:underline;">
                ¿No tienes cuenta? Solicita acceso aquí
            </span>
        </div>

        <div id="registro-form-container" style="display:none; margin-top:15px; border-top:1px dashed var(--neon); padding-top:15px;">
            <h3 style="font-size:0.8rem; text-align:center; text-transform:uppercase;">Solicitar Acceso</h3>
            <div class="login-form">
                <input type="text" id="reg-usuario" placeholder="Nombre de Usuario (Ej: pedro12)">
                <input type="password" id="reg-pass" placeholder="Contraseña">
                <button id="btn_enviar_solicitud" onclick="enviarSolicitud()" class="btn">Enviar Solicitud</button>
            </div>
            <div id="loading_register" style="display:none; text-align:center; margin-top:5px; color:var(--win);">
                Procesando con la nube...
            </div>
            <button onclick="mostrarRegistroForm(false)" class="btn" style="background:transparent; color:var(--error); border-color:var(--error); margin-top:5px; width:100%;">
                Volver Atrás
            </button>
        </div>
    </div>

    <div id="app-section" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom:1px solid #222; padding-bottom:5px;">
            <span id="user-display" style="font-size:0.75rem; font-weight:bold; color:var(--win);">User: -</span>
            <span onclick="logout()" style="font-size:0.7rem; color:var(--error); cursor:pointer; text-transform:uppercase;">[Salir]</span>
        </div>

        <div class="dashboard-grid">
            <div class="stat-card">
                <h4>Fijo Tarde Hoy</h4>
                <p id="dash-tarde">-</p>
            </div>
            <div class="stat-card">
                <h4>Fijo Noche Hoy</h4>
                <p id="dash-noche">-</p>
            </div>
        </div>

        <div class="cal-controls">
            <button onclick="cambiarMes(-1)" class="btn" style="padding:5px 12px; font-size:0.75rem;">&lt;</button>
            <span id="cal-month-title" style="font-size:0.85rem; font-weight:bold; text-transform:uppercase;">-</span>
            <button onclick="cambiarMes(1)" class="btn" style="padding:5px 12px; font-size:0.75rem;">&gt;</button>
        </div>

        <div class="cal-grid" id="cal-headers-container"></div>
        <div class="cal-grid" id="cal-days-container" style="margin-top:5px;"></div>

        <div id="admin-panel" style="display:none;">
            <h3 style="font-size:0.75rem; color:var(--win); margin-top:0; text-transform:uppercase; border-bottom:1px solid var(--win); padding-bottom:4px;">Consola de Control</h3>
            
            <div style="margin-top:10px; margin-bottom:15px;">
                <h4 style="font-size:0.7rem; margin:0 0 5px 0; text-transform:uppercase; color:#aaa;">Inyección Masiva en Bruto</h4>
                <textarea id="import_raw_text" rows="3" placeholder="Pega los bloques históricos aquí (Ej: 12/31/03 E4-6-6 12/30/03 E5-4-7)..." style="font-size:0.75rem; resize:vertical; margin-bottom:5px;"></textarea>
                <button onclick="procesarTextoImportado()" class="btn" style="width:100%; padding:8px; font-size:0.75rem; background:var(--win); color:#000;">Procesar e Inyectar en Supabase</button>
            </div>

            <h4 style="font-size:0.7rem; margin:0 0 5px 0; text-transform:uppercase; color:#aaa;">Gestión de Permisos</h4>
            <div id="admin-users-list"></div>
        </div>
    </div>
</div>

<div class="modal" id="tiro-modal">
    <div class="modal-content">
        <h3 id="modal-date-title" style="font-size:0.8rem; margin-top:0; border-bottom:1px solid var(--neon); padding-bottom:6px; text-transform:uppercase;">-</h3>
        <div class="main-form" style="margin-top:15px;">
            <div>
                <label style="font-size:0.65rem; color:#888; text-transform:uppercase; display:block; margin-bottom:4px;">Fijo de la Tarde</label>
                <input type="number" id="input-tarde" placeholder="--" min="0" max="99">
            </div>
            <div style="margin-top:5px;">
                <label style="font-size:0.65rem; color:#888; text-transform:uppercase; display:block; margin-bottom:4px;">Fijo de la Noche</label>
                <input type="number" id="input-noche" placeholder="--" min="0" max="99">
            </div>
            
            <div id="loading_modal" style="display:none; text-align:center; font-size:0.75rem; color:var(--win); margin:5px 0;">
                Sincronizando con Supabase...
            </div>

            <div class="grid-2" style="margin-top:15px;">
                <button onclick="cerrarModal()" class="btn" style="background:transparent; color:var(--error); border-color:var(--error); border:1px solid var(--error);">Cancelar</button>
                <button id="btn_guardar_tiro" onclick="guardarTiroForm()" class="btn">Guardar</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Configuración Central de Credenciales
    const SUPABASE_URL = "https://wbmfscfbybfeebvpyvcf.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndibWZzY2ZieWJmZWVidXB5dmNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU5Mzk2NzYsImV4cCI6MjAzMTUxNTY3Nn0.V7Xb1U4XyX0X_X7X_X7X_X7X_X7X_X7X_X7X_X7X_X7X";

    let db = JSON.parse(localStorage.getItem('bolita_master_db')) || {};
    let currentUser = JSON.parse(localStorage.getItem('bolita_current_user')) || null;
    let fechaSeleccionadaGlobal = null;

    let fechaFiltroActual = new Date();
    const diasSemana = ['Do', 'Lu', 'Ma', 'Mi', 'Ju', 'Vi', 'Sá'];
    const nombresMeses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

    window.onload = function() {
        if(currentUser) {
            activarSeccionApp();
        } else {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('app-section').style.display = 'none';
        }
    };

    function mostrarRegistroForm(ver) {
        document.getElementById('registro-form-container').style.display = ver ? 'block' : 'none';
    }

    // ==========================================
    // CAMBIO 1: REGISTRO SIMPLIFICADO SÚPER SEGURO
    // ==========================================
    async function enviarSolicitud() {
        let u = document.getElementById('reg-usuario').value.trim();
        let p = document.getElementById('reg-pass').value;
        let btn = document.getElementById('btn_enviar_solicitud');
        let loader = document.getElementById('loading_register');

        if(!u || !p) return alert("Completa todos los campos, acere.");

        btn.disabled = true;
        loader.style.display = 'block';

        try {
            // 1. Verificar si el nombre de usuario ya está tomado o solicitado
            const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?nombre=eq.${encodeURIComponent(u)}`, {
                method: 'GET',
                headers: { 
                    'apikey': SUPABASE_KEY, 
                    'Authorization': `Bearer ${SUPABASE_KEY}` 
                }
            });
            
            if (!checkRes.ok) {
                let errorTexto = await checkRes.text();
                throw new Error(`Error de verificación: ${errorTexto}`);
            }

            let existe = await checkRes.json();
            if (Array.isArray(existe) && existe.length > 0) {
                alert("Este nombre de usuario ya está registrado o en espera. Elige otro diferente.");
                btn.disabled = false; loader.style.display = 'none';
                return;
            }

            // 2. Insertar mapeando EXACTAMENTE a tus columnas de Supabase ('nombre', 'clave', 'rol')
            let payload = { 
                nombre: u, 
                clave: p, 
                rol: 'pendiente'
            };

            const regRes = await fetch(`${SUPABASE_URL}/rest/v1/usuarios`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            loader.style.display = 'none';
            btn.disabled = false;

            if (regRes.ok) {
                alert("¡Solicitud enviada con éxito total! Dile al administrador que te apruebe el usuario: " + u);
                document.getElementById('reg-usuario').value = "";
                document.getElementById('reg-pass').value = "";
                mostrarRegistroForm(false);
            } else {
                let errorDetalle = await regRes.text();
                console.error("Error Supabase:", errorDetalle);
                alert(`Error de inserción en la nube:\n${errorDetalle}`);
            }
        } catch (e) {
            loader.style.display = 'none'; btn.disabled = false;
            console.error("Error general:", e);
            alert(`Error de ejecución: ${e.message}`);
        }
    }

    async function intentarLogin() {
        let u = document.getElementById('login-user').value.trim();
        let p = document.getElementById('login-pass').value;
        if(!u || !p) return alert("Escribe tus datos, acere.");

        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?nombre=eq.${encodeURIComponent(u)}&clave=eq.${encodeURIComponent(p)}`, {
                method: 'GET',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            let r = await res.json();
            if(Array.isArray(r) && r.length > 0) {
                let user = r[0];
                if(user.rol === 'pendiente') {
                    alert("Tu usuario aún está en fase 'pendiente'. Dile al administrador que te dé de alta.");
                } else {
                    currentUser = user;
                    localStorage.setItem('bolita_current_user', JSON.stringify(currentUser));
                    activarSeccionApp();
                }
            } else {
                alert("Usuario o clave incorrectos, revisa bien.");
            }
        } catch(e) {
            alert("Error de red al intentar conectar.");
        }
    }

    async function activarSeccionApp() {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('app-section').style.display = 'block';
        document.getElementById('user-display').innerText = `USER: ${currentUser.nombre.toUpperCase()} [${currentUser.rol.toUpperCase()}]`;
        
        if(currentUser.rol === 'admin') {
            document.getElementById('admin-panel').style.display = 'block';
            cargarUsuariosAdmin();
        } else {
            document.getElementById('admin-panel').style.display = 'none';
        }
        
        await bajarDatosDeNube();
        renderCalendario();
        actualizarDashboardHoy();
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('bolita_current_user');
        document.getElementById('login-section').style.display = 'block';
        document.getElementById('app-section').style.display = 'none';
    }

    async function bajarDatosDeNube() {
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/tiros_historicos`, {
                method: 'GET',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            let datos = await res.json();
            if(Array.isArray(datos)) {
                db = {};
                datos.forEach(f => {
                    let k = f.fecha;
                    if(!db[k]) db[k] = {};
                    if(f.fijo_tarde !== null && f.fijo_tarde !== undefined) db[k]['t'] = f.fijo_tarde.toString().padStart(2,'0');
                    if(f.fijo_noche !== null && f.fijo_noche !== undefined) db[k]['n'] = f.fijo_noche.toString().padStart(2,'0');
                });
                localStorage.setItem('bolita_master_db', JSON.stringify(db));
            }
        } catch(e) { console.error("Error bajando datos de la nube:", e); }
    }

    function actualizarDashboardHoy() {
        let hoy = new Date();
        let k = `${hoy.getFullYear()}-${(hoy.getMonth()+1).toString().padStart(2,'0')}-${hoy.getDate().toString().padStart(2,'0')}`;
        document.getElementById('dash-tarde').innerText = (db[k] && db[k]['t']) ? db[k]['t'] : '--';
        document.getElementById('dash-noche').innerText = (db[k] && db[k]['n']) ? db[k]['n'] : '--';
    }

    function renderCalendario() {
        let hContainer = document.getElementById('cal-headers-container');
        let dContainer = document.getElementById('cal-days-container');
        hContainer.innerHTML = ''; dContainer.innerHTML = '';

        diasSemana.forEach(d => { hContainer.innerHTML += `<div class="cal-header">${d}</div>`; });

        let año = fechaFiltroActual.getFullYear();
        let mes = fechaFiltroActual.getMonth();
        document.getElementById('cal-month-title').innerText = `${nombresMeses[mes]} ${año}`;

        let primerDia = new Date(año, mes, 1).getDay();
        let totalDias = new Date(año, mes + 1, 0).getDate();

        for(let i=0; i<primerDia; i++) { dContainer.innerHTML += `<div></div>`; }

        let hoy = new Date();
        let hoyKey = `${hoy.getFullYear()}-${(hoy.getMonth()+1).toString().padStart(2,'0')}-${hoy.getDate().toString().padStart(2,'0')}`;

        for(let d=1; d<=totalDias; d++) {
            let currentK = `${año}-${(mes+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
            let esHoy = (currentK === hoyKey) ? 'today' : '';
            
            let htmlTiros = '';
            if(db[currentK]) {
                if(db[currentK]['t']) htmlTiros += `<div class="t-mini tarde">${db[currentK]['t']}</div>`;
                if(db[currentK]['n']) htmlTiros += `<div class="t-mini noche">${db[currentK]['n']}</div>`;
            }

            dContainer.innerHTML += `
                <div class="cal-day ${esHoy}" onclick="abrirModalTiro('${currentK}')">
                    <div class="day-num">${d}</div>
                    <div class="day-tiros">${htmlTiros}</div>
                </div>
            `;
        }
    }

    function cambiarMes(dir) {
        fechaFiltroActual.setMonth(fechaFiltroActual.getMonth() + dir);
        renderCalendario();
    }

    function abrirModalTiro(k) {
        if(currentUser.rol !== 'admin' && currentUser.rol !== 'editor') {
            return alert("No tienes permisos de escritura en la Consola Global.");
        }
        fechaSeleccionadaGlobal = k;
        document.getElementById('modal-date-title').innerText = `Editar: ${k}`;
        document.getElementById('input-tarde').value = (db[k] && db[k]['t']) ? parseInt(db[k]['t']) : '';
        document.getElementById('input-noche').value = (db[k] && db[k]['n']) ? parseInt(db[k]['n']) : '';
        document.getElementById('tiro-modal').style.display = 'flex';
    }

    function cerrarModal() { document.getElementById('tiro-modal').style.display = 'none'; }

    async function guardarTiroForm() {
        let tVal = document.getElementById('input-tarde').value.trim();
        let nVal = document.getElementById('input-noche').value.trim();
        
        let tNum = tVal !== '' ? tVal.padStart(2,'0') : undefined;
        let nNum = nVal !== '' ? nVal.padStart(2,'0') : undefined;

        document.getElementById('btn_guardar_tiro').disabled = true;
        document.getElementById('loading_modal').style.display = 'block';

        let exito = await registrarTiroEnNube(fechaSeleccionadaGlobal, tNum, nNum);

        document.getElementById('btn_guardar_tiro').disabled = false;
        document.getElementById('loading_modal').style.display = 'none';

        if(exito) {
            if(!db[fechaSeleccionadaGlobal]) db[fechaSeleccionadaGlobal] = {};
            if(tNum) db[fechaSeleccionadaGlobal]['t'] = tNum; else delete db[fechaSeleccionadaGlobal]['t'];
            if(nNum) db[fechaSeleccionadaGlobal]['n'] = nNum; else delete db[fechaSeleccionadaGlobal]['n'];
            
            localStorage.setItem('bolita_master_db', JSON.stringify(db));
            cerrarModal();
            renderCalendario();
            actualizarDashboardHoy();
        } else {
            alert("Error de sincronización con Supabase.");
        }
    }

    async function registrarTiroEnNube(fecha, tarde, noche) {
        try {
            const check = await fetch(`${SUPABASE_URL}/rest/v1/tiros_historicos?fecha=eq.${fecha}`, {
                method: 'GET',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            let existe = await check.json();

            let url = `${SUPABASE_URL}/rest/v1/tiros_historicos`;
            let method = 'POST';
            let headers = {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json'
            };

            let payload = {
                fecha: fecha,
                fijo_tarde: tarde ? parseInt(tarde) : null,
                fijo_noche: noche ? parseInt(noche) : null
            };

            if(Array.isArray(existe) && existe.length > 0) {
                method = 'PATCH';
                url += `?fecha=eq.${fecha}`;
            }

            const res = await fetch(url, { method: method, headers: headers, body: JSON.stringify(payload) });
            return res.ok;
        } catch(e) { return false; }
    }

    // ==========================================
    // CAMBIO 2: IMPORTADOR HISTÓRICO INTEGRADO
    // ==========================================
    async function procesarTextoImportado() {
        const raw = document.getElementById('import_raw_text').value;
        if (!raw.trim()) return alert("El cuadro de texto está vacío.");
        
        let cnt = 0;
        const regexTiro = /(\d{1,2})\/(\d{1,2})\/(\d{2,4})\s*([A-Za-z])\s*(\d+-\d+-\d+(?:\s*FB\d+)?)/i;
        const regexGlobal = /(\d{1,2}\/\d{1,2}\/\d{2,4}\s*[A-Za-z]\s*\d+-\d+-\d+(?:\s*FB\d+)?)/gi;
        let coincidencias = raw.match(regexGlobal);

        if (!coincidencias || coincidencias.length === 0) {
            alert("Estructura no reconocida."); return;
        }

        for (let bloque of coincidencias) {
            let m = regexTiro.exec(bloque);
            if (m) {
                let mes = m[1].padStart(2, '0'); 
                let dia = m[2].padStart(2, '0'); 
                let anioStr = m[3];
                let letraTurno = m[4].toUpperCase(); 
                let datosTiro = m[5];
                
                // Corrección de Siglo para años antiguos de 2 dígitos
                let fullAnio = anioStr;
                if (anioStr.length === 2) {
                    let numAnio = parseInt(anioStr);
                    fullAnio = numAnio >= 80 ? "19" + anioStr : "20" + anioStr;
                }
                
                let k = `${fullAnio}-${mes}-${dia}`;

                let partesGuiones = datosTiro.split('-');
                if (partesGuiones.length >= 3) {
                    let numFijo = partesGuiones[1].trim().padStart(2, '0').slice(-2);
                    
                    // Separación real por letra: M o N van a la noche, las demás (E, etc.) a la tarde
                    let tu = (letraTurno === 'M' || letraTurno === 'N') ? 'n' : 't';

                    if (!db[k]) db[k] = {};
                    db[k][tu] = numFijo;
                    
                    await registrarTiroEnNube(k, tu === 't' ? numFijo : undefined, tu === 'n' ? numFijo : undefined);
                    cnt++;
                }
            }
        }

        if (cnt === 0) return alert("No se pudo extraer ningún número válido.");
        localStorage.setItem('bolita_master_db', JSON.stringify(db));
        alert(`¡Éxito Total, acere! Se inyectaron ${cnt} tiros históricos mapeados en Supabase.`);
        document.getElementById('import_raw_text').value = ""; 
        renderCalendario();
    }

    async function cargarUsuariosAdmin() {
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/usuarios`, {
                method: 'GET',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            let users = await res.json();
            let container = document.getElementById('admin-users-list');
            container.innerHTML = '';

            if(Array.isArray(users)) {
                users.forEach(u => {
                    if(u.nombre === currentUser.nombre) return; 
                    
                    container.innerHTML += `
                        <div class="user-row">
                            <span>${u.nombre.toUpperCase()} (${u.rol})</span>
                            <select onchange="cambiarRolUsuario('${u.nombre}', this.value)" style="width:110px; padding:3px; font-size:0.75rem;">
                                <option value="pendiente" ${u.rol==='pendiente'?'selected':''}>Pendiente</option>
                                <option value="editor" ${u.rol==='editor'?'selected':''}>Editor</option>
                                <option value="admin" ${u.rol==='admin'?'selected':''}>Admin</option>
                            </select>
                        </div>
                    `;
                });
            }
        } catch(e) { console.error("Error cargando usuarios:", e); }
    }

    async function cambiarRolUsuario(username, nuevoRol) {
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?nombre=eq.${encodeURIComponent(username)}`, {
                method: 'PATCH',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ rol: nuevoRol })
            });
            if(res.ok) {
                alert(`Rol de ${username} actualizado a ${nuevoRol}.`);
                cargarUsuariosAdmin();
            } else { alert("No se pudo actualizar el rol."); }
        } catch(e) { alert("Error de red."); }
    }
</script>
