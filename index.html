<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolita Pro Master - Consola Global Elite v8.8</title>
    <style>
        :root { --neon: #00ff41; --dark: #050505; --panel: #0d1117; --win: #ffeb3b; --error: #ff3333; }
        body { font-family: 'Segoe UI', monospace; background: var(--dark); color: var(--neon); margin: 0; padding: 10px; -webkit-user-select: none; user-select: none; }
        .container { max-width: 480px; margin: auto; border: 1px solid var(--neon); padding: 15px; border-radius: 8px; box-sizing: border-box; }
        h2 { font-size: 0.8rem; text-align: center; border-bottom: 1px solid var(--neon); padding-bottom: 8px; text-transform: uppercase; margin-bottom: 15px; }
        
        .main-form, .login-form { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select, textarea { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 10px; font-size: 1rem; border-radius: 4px; font-family: monospace; }
        input:focus, select:focus, textarea:focus { outline: none; box-shadow: 0 0 8px var(--neon); }
        button { background: var(--neon); color: #000; border: none; padding: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; font-family: monospace; }
        button:hover { background: #00cc33; box-shadow: 0 0 10px var(--neon); }
        
        .btn-danger { background: #220000; color: var(--error); border: 1px solid var(--error); }
        .btn-danger:hover { background: var(--error); color: #000; }
        .btn-warning { background: #222200; color: var(--win); border: 1px solid var(--win); }
        .btn-warning:hover { background: var(--win); color: #000; }

        .dashboard { display: none; }
        .nav-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px; }
        .nav-tabs button { padding: 8px 2px; font-size: 0.75rem; background: #111; color: #888; border: 1px solid #333; }
        .nav-tabs button.active { background: #002200; color: var(--neon); border: 1px solid var(--neon); }
        
        .tab-content { display: none; background: var(--panel); padding: 15px; border-radius: 6px; border: 1px solid #222; }
        .tab-content.active { display: block; }

        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day-name { font-size: 0.7rem; color: #888; font-weight: bold; padding-bottom: 5px; }
        .day-cell { border: 1px solid #222; padding: 4px 2px; min-height: 50px; border-radius: 4px; background: #000; font-size: 0.8rem; display: flex; flex-direction: column; justify-content: space-between; }
        .day-cell.empty { background: transparent; border: none; }
        .day-num { font-size: 0.7rem; color: #666; text-align: left; padding-left: 2px; }
        .day-tarde { color: var(--win); font-weight: bold; font-size: 0.85rem; }
        .day-noche { color: var(--neon); font-weight: bold; font-size: 0.85rem; }
        
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .badge { padding: 2px 6px; border-radius: 3px; font-size: 0.75rem; font-weight: bold; }
        .badge.activo { background: #002200; color: var(--neon); border: 1px solid var(--neon); }
        .badge.pendiente { background: #221100; color: var(--win); border: 1px solid var(--win); }
        
        .action-icon { cursor: pointer; padding: 4px 8px; border: 1px solid #444; border-radius: 4px; font-size: 0.8rem; }
        .action-icon:hover { background: #222; }

        .raw-importer { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--neon); }
        .raw-importer label { font-size: 0.75rem; text-transform: uppercase; color: var(--win); }

        .status-bar { font-size: 0.7rem; color: #666; text-align: center; margin-top: 15px; border-top: 1px solid #111; padding-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Bolita Pro Master v8.8</h2>
    
    <div id="login-screen" class="login-form">
        <input type="text" id="login-user" placeholder="USUARIO OPERATIVO">
        <input type="password" id="login-pass" placeholder="CLAVE DE ACCESO">
        <button onclick="ejecutarLogin()">INGRESAR AL SISTEMA</button>
        <button class="btn-warning" onclick="mostrarRegistro()">CREAR NUEVA CUENTA</button>
    </div>

    <div id="register-screen" class="login-form" style="display:none;">
        <input type="text" id="reg-user" placeholder="NUEVO USUARIO">
        <input type="password" id="reg-pass" placeholder="NUEVA CLAVE">
        <button onclick="ejecutarRegistro()">SOLICITAR ALTA</button>
        <button class="btn-danger" onclick="cancelarRegistro()">VOLVER</button>
    </div>

    <div id="dashboard" class="dashboard">
        <div class="nav-tabs">
            <button id="btn-tab-cal" class="active" onclick="cambiarTab('tab-cal')">VER CALENDARIO</button>
            <button id="btn-tab-input" onclick="cambiarTab('tab-input')">TIROS</button>
            <button id="btn-tab-users" style="display:none;" onclick="cambiarTab('tab-users')">USERS</button>
            <button class="btn-danger" onclick="ejecutarLogout()">SALIR</button>
        </div>

        <div id="tab-cal" class="tab-content active">
            <div class="cal-header">
                <button onclick="cambiarMes(-1)">◀ MES</button>
                <span id="cal-month-title" style="font-weight:bold; font-size:0.9rem; text-transform:uppercase;">-</span>
                <button onclick="cambiarMes(1)">MES ▶</button>
            </div>
            <div class="cal-grid" id="cal-grid-container"></div>
        </div>

        <div id="tab-input" class="tab-content">
            <div class="main-form">
                <input type="date" id="tiro-fecha">
                <div class="grid-2">
                    <input type="text" id="tiro-tarde" placeholder="FIJO TARDE" maxlength="4">
                    <input type="text" id="tiro-noche" placeholder="FIJO NOCHE" maxlength="4">
                </div>
                <button onclick="guardarTiroDirecto()">GUARDAR CAMBIOS DEL CALENDARIO</button>
            </div>

            <div class="raw-importer">
                <label>📥 Importador en bruto desde Notas / PDF</label>
                <textarea id="raw-text" rows="5" placeholder="Pega aquí el texto copiado de notas... Ejemplo:&#10;1- 54 y 89&#10;02/05/2026: 12 - 45&#10;Día 3 tarde 44 noche 12"></textarea>
                <button class="btn-warning" onclick="procesarTextoImportado()">PROCESAR E IMPORTAR TEXTO</button>
            </div>
        </div>

        <div id="tab-users" class="tab-content">
            <div id="users-list-container"></div>
        </div>
        
        <div class="status-bar">CONEXIÓN DIRECTA ENCRIPTADA SUPABASE ACTIVA</div>
    </div>
</div>

<script>
    // =================================================================
    // CONFIGURACIÓN DE CONEXIÓN CON TU PROYECTO 'BilitaBase'
    // =================================================================
    const SUPABASE_URL = "https://qmeknaemendhxbfgnmeb.supabase.co";
    const SUPABASE_KEY = "sb_publishable_3WYpDpVXShVagap1x7K4GA_EEynNqGR";

    // =================================================================
    // CLIENTE API REST MOTORIZADO
    // =================================================================
    async function supabaseFetch(endpoint, method = 'GET', body = null) {
        const url = `${SUPABASE_URL}/rest/v1/${endpoint}`;
        const headers = {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation'
        };
        const config = { method, headers };
        if (body) config.body = JSON.stringify(body);
        const res = await fetch(url, config);
        if (!res.ok) throw new Error(`SupaError: ${res.statusText}`);
        return res.json();
    }

    // =================================================================
    // VARIABLES DE ESTADO LOCAL
    // =================================================================
    let usuarioActual = null;
    let baseHistorico = {}; // Memoria en ejecución estructurada como { "YYYY-MM-DD": { fijo_tarde, fijo_noche } }
    let fechaFiltro = new Date();

    // Inicializar inputs de fecha
    document.getElementById('tiro-fecha').value = new Date().toISOString().split('T')[0];

    // =================================================================
    // CONTROLADOR DE CAPAS (TABS)
    // =================================================================
    function cambiarTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-tabs button').forEach(b => {
            if(b.id !== '') b.classList.remove('active');
        });
        document.getElementById(tabId).classList.add('active');
        const btnMap = { 'tab-cal': 'btn-tab-cal', 'tab-input': 'btn-tab-input', 'tab-users': 'btn-tab-users' };
        if(btnMap[tabId]) document.getElementById(btnMap[tabId]).classList.add('active');
        
        if (tabId === 'tab-cal') renderCalendario();
        if (tabId === 'tab-users') cargarListaUsuariosAdmin();
    }

    // =================================================================
    // SISTEMA DE SEGURIDAD, LOGIN Y REGISTRO
    // =================================================================
    async function ejecutarLogin() {
        const u = document.getElementById('login-user').value.trim().toLowerCase();
        const p = document.getElementById('login-pass').value.trim();
        if(!u || !p) return alert("Escriba usuario y clave, acere.");

        try {
            const data = await supabaseFetch(`usuarios?nombre=eq.${u}&clave=eq.${p}`, 'GET');
            if(data.length === 0) return alert("Usuario o clave incorrectos.");
            
            const user = data[0];
            if(user.rol === 'pendiente') return alert("Tu cuenta está registrada pero en estado 'pendiente'. Pídele al administrador que te active.");
            
            usuarioActual = user;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            
            if(usuarioActual.rol === 'admin') {
                document.getElementById('btn-tab-users').style.display = 'block';
            }
            
            // Descargar histórico inicial de base de datos e iniciar la PWA
            await sincronizarHistorico();
            cambiarTab('tab-cal');
        } catch(err) {
            alert("Error de red al iniciar sesión. Inténtelo más tarde.");
        }
    }

    function mostrarRegistro() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('register-screen').style.display = 'none';
        document.getElementById('register-screen').style.display = 'grid';
    }
    function cancelarRegistro() {
        document.getElementById('register-screen').style.display = 'none';
        document.getElementById('login-screen').style.display = 'grid';
    }

    async function ejecutarRegistro() {
        const u = document.getElementById('reg-user').value.trim().toLowerCase();
        const p = document.getElementById('reg-pass').value.trim();
        if(!u || !p) return alert("Llene los campos.");

        try {
            const existe = await supabaseFetch(`usuarios?nombre=eq.${u}`, 'GET');
            if(existe.length > 0) return alert("Ese nombre de usuario ya está solicitado.");

            await supabaseFetch('usuarios', 'POST', { nombre: u, clave: p, rol: 'pendiente' });
            alert("Solicitud enviada con éxito. Espera a que el administrador cambie tu estado a 'activo'.");
            cancelarRegistro();
        } catch(err) {
            alert("Error al procesar el registro.");
        }
    }

    function ejecutarLogout() {
        usuarioActual = null;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('btn-tab-users').style.display = 'none';
        document.getElementById('login-screen').style.display = 'grid';
        document.getElementById('login-user').value = '';
        document.getElementById('login-pass').value = '';
    }

    // =================================================================
    // MOTOR DE SINCRONIZACIÓN SEGURO (NUBE + LOCAL STORAGE)
    // =================================================================
    async function sincronizarHistorico() {
        try {
            // Intentar descargar desde Supabase siempre primero
            const data = await supabaseFetch('historico', 'GET');
            baseHistorico = {};
            data.forEach(item => {
                if(item.fecha) {
                    baseHistorico[item.fecha] = {
                        fijo_tarde: item.fijo_tarde || '-',
                        fijo_noche: item.fijo_noche || '-'
                    };
                }
            });
            // Si la descarga fue exitosa, respaldar inmediatamente en localStorage
            localStorage.setItem('local_historico', JSON.stringify(baseHistorico));
            console.log("Sincronización con la nube exitosa. Caché local actualizada.");
        } catch(err) {
            console.warn("Fallo de conexión a Supabase. Cargando copia de seguridad local...", err);
            // Si falla la red, jalar la copia local para no dejar colgado al usuario
            const localData = localStorage.getItem('local_historico');
            if(localData) {
                baseHistorico = JSON.parse(localData);
            } else {
                baseHistorico = {};
            }
        }
    }

    // =================================================================
    // MOTOR DE PERSISTENCIA DOBLE (GUARDA EN AMBOS LUGARES)
    // =================================================================
    async function persistirTiro(fecha, tarde, noche) {
        // 1. Guardar primero en el LocalStorage interno del teléfono de manera inmediata
        baseHistorico[fecha] = { fijo_tarde: tarde, fijo_noche: noche };
        localStorage.setItem('local_historico', JSON.stringify(baseHistorico));

        // 2. Intentar guardar en Supabase (Nube) de forma asíncrona
        try {
            // Verificar si el registro de esa fecha ya existe en Supabase para decidir si hacer POST o PATCH
            const existCheck = await supabaseFetch(`historico?fecha=eq.${fecha}`, 'GET');
            
            if(existCheck.length > 0) {
                // Actualizar registro existente
                await supabaseFetch(`historico?fecha=eq.${fecha}`, 'PATCH', {
                    fijo_tarde: tarde,
                    fijo_noche: noche
                });
            } else {
                // Insertar nuevo registro
                await supabaseFetch('historico', 'POST', {
                    fecha: fecha,
                    fijo_tarde: tarde,
                    fijo_noche: noche
                });
            }
            return { status: 'completo', msg: "¡Calendario actualizado y guardado en Supabase y copia local!" };
        } catch (error) {
            console.error("Error al subir a Supabase, pero los datos están a salvo en el móvil:", error);
            // Retornamos un estado que avise que se guardó pero solo a nivel local por problemas de red
            return { status: 'local_only', msg: "Guardado localmente en el móvil. (Error de red: no se pudo subir a Supabase en este momento)." };
        }
    }

    // Acciones del botón directo de la interfaz
    async function guardarTiroDirecto() {
        if(usuarioActual.rol !== 'admin') return alert("Permiso denegado. Solo administradores pueden guardar tiros.");
        
        const fecha = document.getElementById('tiro-fecha').value;
        const tarde = document.getElementById('tiro-tarde').value.trim() || '-';
        const noche = document.getElementById('tiro-noche').value.trim() || '-';
        
        if(!fecha) return alert("Selecciona una fecha válida, acere.");

        const resultado = await persistirTiro(fecha, tarde, noche);
        alert(resultado.msg);
        
        // Limpiar inputs
        document.getElementById('tiro-tarde').value = '';
        document.getElementById('tiro-noche').value = '';
        renderCalendario();
    }

    // =================================================================
    // PARSER AVANZADO E IMPORTADOR EN BLOQUE
    // =================================================================
    async function procesarTextoImportado() {
        if(usuarioActual.rol !== 'admin') return alert("Acceso denegado.");
        const txt = document.getElementById('raw-text').value;
        if(!txt.trim()) return alert("El cuadro está vacío. Pega texto antes de procesar.");

        const lineas = txt.split('\n');
        let añoActual = fechaFiltro.getFullYear();
        let mesActual = fechaFiltro.getMonth(); 
        let procesados = 0;
        let erroresRed = false;

        for(let linea of lineas) {
            linea = linea.trim();
            if(!linea) continue;

            let dia = null;
            let tarde = '-';
            let noche = '-';
            let fechaClave = null;

            // CASO A: Formato completo con barras diagonales (Ej: 02/05/2026: 12 - 45 o 2/5: 80 - 10)
            if(linea.includes('/')) {
                const matchFecha = linea.match(/(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?/);
                if(matchFecha) {
                    dia = parseInt(matchFecha[1], 10);
                    let m = parseInt(matchFecha[2], 10) - 1;
                    let a = matchFecha[3] ? parseInt(matchFecha[3], 10) : añoActual;
                    if(a < 100) a += 2000; 

                    // Extraer los números limpiando el resto de la línea
                    const resto = linea.replace(matchFecha[0], '');
                    const numeros = resto.match(/\d+/g);
                    if(numeros) {
                        tarde = numeros[0] || '-';
                        noche = numeros[1] || '-';
                    }
                    fechaClave = `${a}-${String(m+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
                }
            } 
            // CASO B: Formato plano por números de lista (Ej: "1- 70 y 71" o "05 - 88 y 21")
            else {
                const matchDiaPlano = linea.match(/^(\d{1,2})\s*[-:]?\s*(.*)/);
                if(matchDiaPlano) {
                    dia = parseInt(matchDiaPlano[1], 10);
                    const contenido = matchDiaPlano[2];
                    const numeros = contenido.match(/\d+/g);
                    if(numeros) {
                        tarde = numeros[0] || '-';
                        noche = numeros[1] || '-';
                    }
                    fechaClave = `${añoActual}-${String(mesActual+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
                }
            }

            // Si el parser logró extraer una fecha estructurada, procesamos el doble guardado
            if(fechaClave && !isNaN(dia)) {
                const res = await persistirTiro(fechaClave, tarde, noche);
                if(res.status === 'local_only') erroresRed = true;
                procesados++;
            }
        }

        document.getElementById('raw-text').value = '';
        await sincronizarHistorico(); // Actualizar interfaz limpia
        renderCalendario();

        if(erroresRed) {
            alert(`Se procesaron ${procesados} días con éxito localmente, pero hubo problemas de red para subirlos a Supabase. Los datos se mantendrán a salvo en el móvil.`);
        } else {
            alert(`¡Éxito Total, acere! Se han procesado y guardado ${procesados} registros en Supabase y copia de seguridad local.`);
        }
    }

    // =================================================================
    // RENDERIZADOR DEL CALENDARIO DINÁMICO
    // =================================================================
    function cambiarMes(dir) {
        fechaFiltro.setMonth(fechaFiltro.getMonth() + dir);
        renderCalendario();
    }

    function renderCalendario() {
        const nombresMeses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        const año = fechaFiltro.getFullYear();
        const mes = fechaFiltro.getMonth();
        
        document.getElementById('cal-month-title').innerText = `${nombresMeses[mes]} ${año}`;
        
        const contenedor = document.getElementById('cal-grid-container');
        contenedor.innerHTML = '';
        
        // Renderizar cabecera de días
        const diasSemana = ['L', 'M', 'M', 'J', 'V', 'S', 'D'];
        diasSemana.forEach(d => {
            const div = document.createElement('div');
            div.className = 'day-name';
            div.innerText = d;
            contenedor.appendChild(div);
        });
        
        // Calcular desfase de cuadrícula
        let primerDia = new Date(año, mes, 1).getDay();
        let desajuste = primerDia === 0 ? 6 : primerDia - 1; // Ajustar para que la semana empiece en Lunes
        
        const diasTotales = new Date(año, mes + 1, 0).getDate();
        
        // Celdas vacías iniciales
        for(let i=0; i<desajuste; i++) {
            const empty = document.createElement('div');
            empty.className = 'day-cell empty';
            contenedor.appendChild(empty);
        }
        
        // Crear celdas operativas para cada día del mes
        for(let d=1; d<=diasTotales; d++) {
            const fechaString = `${año}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const datosDia = baseHistorico[fechaString] || { fijo_tarde: '-', fijo_noche: '-' };
            
            const celda = document.createElement('div');
            celda.className = 'day-cell';
            
            // Evento interactivo para el administrador (autocompleta la fecha al tocar el día)
            if(usuarioActual && usuarioActual.role === 'admin' || usuarioActual.rol === 'admin') {
                celda.style.cursor = 'pointer';
                celda.onclick = () => {
                    document.getElementById('tiro-fecha').value = fechaString;
                    document.getElementById('tiro-tarde').value = datosDia.fijo_tarde === '-' ? '' : datosDia.fijo_tarde;
                    document.getElementById('tiro-noche').value = datosDia.fijo_noche === '-' ? '' : datosDia.fijo_noche;
                    cambiarTab('tab-input');
                };
            }
            
            celda.innerHTML = `
                <div class="day-num">${d}</div>
                <div class="day-tarde">${datosDia.fijo_tarde}</div>
                <div class="day-noche">${datosDia.fijo_noche}</div>
            `;
            contenedor.appendChild(celda);
        }
    }

    // =================================================================
    // PANEL ADMINISTRATIVO DE ROLES DE USUARIOS
    // =================================================================
    async function cargarListaUsuariosAdmin() {
        if(usuarioActual.rol !== 'admin') return;
        const contenedor = document.getElementById('users-list-container');
        contenedor.innerHTML = '<div style="font-size:0.8rem;color:#666;text-align:center;">Cargando lista...</div>';

        try {
            const lista = await supabaseFetch('usuarios', 'GET');
            contenedor.innerHTML = '';
            
            lista.forEach(user => {
                // No mostrarse a sí mismo en la lista editable para evitar accidentes
                if(user.nombre === usuarioActual.nombre) return;

                const row = document.createElement('div');
                row.className = 'user-row';
                
                // Definición de acciones de control de estado
                let botonAccion = '';
                if(user.rol === 'pendiente') {
                    botonAccion = `<span class="action-icon" style="color:var(--neon);border-color:var(--neon);" onclick="cambiarRolUsuario('${user.id}', 'activo')">✓ ACTIVAR</span>`;
                } else {
                    botonAccion = `<span class="action-icon" style="color:var(--error);border-color:var(--error);" onclick="cambiarRolUsuario('${user.id}', 'pendiente')">✕ SUSPENDER</span>`;
                }

                row.innerHTML = `
                    <div>
                        <span style="font-weight:bold; color:#fff;">${user.nombre}</span>
                        <span class="badge ${user.rol}">${user.rol.toUpperCase()}</span>
                    </div>
                    <div>${botonAccion}</div>
                `;
                contenedor.appendChild(row);
            });
        } catch(err) {
            contenedor.innerHTML = '<div style="font-size:0.8rem;color:var(--error);text-align:center;">Error al cargar usuarios.</div>';
        }
    }

    async function cambiarRolUsuario(id, nuevoRol) {
        if(!confirm(`¿Seguro que deseas cambiar el estado de este usuario a ${nuevoRol.toUpperCase()}?`)) return;
        try {
            await supabaseFetch(`usuarios?id=eq.${id}`, 'PATCH', { rol: nuevoRol });
            cargarListaUsuariosAdmin();
        } catch(err) {
            alert("No se pudo cambiar el rol.");
        }
    }

    // Inicialización del sistema al cargar la página
    function inicializarSistema() {
        // Cargar lo que haya en cache local de inmediato para respuesta visual instantánea
        const localData = localStorage.getItem('local_historico');
        if(localData) {
            baseHistorico = JSON.parse(localData);
        }
    }

    window.onload = inicializarSistema;
    // =================================================================
    // MOTOR DE INSTALACIÓN COMO APLICACIÓN MÓVIL (PWA AUTOMÁTICA)
    // =================================================================
    let deferredPrompt;

    const manifestData = {
        "short_name": "BolitaPro",
        "name": "Bolita Pro Master v8.8",
        "icons": [
            { "src": "https://cdn-icons-png.flaticon.com/512/8143/8143123.png", "type": "image/png", "sizes": "512x512" }
        ],
        "start_url": window.location.href,
        "background_color": "#050505",
        "theme_color": "#050505",
        "display": "standalone",
        "orientation": "portrait"
    };
    
    // Crear el enlace del manifiesto dinámicamente si existe el id en el documento
    const pwaManifestEl = document.getElementById('pwa-manifest');
    if(pwaManifestEl) {
        pwaManifestEl.setAttribute('href', 'data:application/manifest+json;base64,' + btoa(JSON.stringify(manifestData)));
    } else {
        const link = document.createElement('link');
        link.id = 'pwa-manifest';
        link.rel = 'manifest';
        link.href = 'data:application/manifest+json;base64,' + btoa(JSON.stringify(manifestData));
        document.head.appendChild(link);
    }

    if ('serviceWorker' in navigator) {
        const swCode = `self.addEventListener('fetch', function(e) { e.respondWith(fetch(e.request)); });`;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(err => console.log("SW Error", err));
    }

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
    });
</script>
</body>
</html>
