<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolita Pro Elite - Sistema de Accesos</title>
    <style>
        :root { --neon: #00ff41; --dark: #050505; --panel: #0d1117; --win: #ffeb3b; --error: #ff3333; }
        body { font-family: 'Segoe UI', monospace; background: var(--dark); color: var(--neon); margin: 0; padding: 10px; }
        .container { max-width: 480px; margin: auto; border: 1px solid var(--neon); padding: 15px; border-radius: 8px; box-sizing: border-box; }
        h2 { font-size: 0.8rem; text-align: center; border-bottom: 1px solid var(--neon); padding-bottom: 8px; text-transform: uppercase; margin-bottom: 15px; }
        
        .main-form, .login-form { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; text-align: center; border-radius: 4px; font-size: 1.1rem; outline: none; width: 100%; box-sizing: border-box; }
        
        button { background: var(--neon); color: var(--dark); border: none; width: 100%; padding: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 1rem; text-transform: uppercase; }
        button.secondary { background: transparent; color: var(--neon); border: 1px solid var(--neon); margin-top: 10px; }
        
        .top-section { margin: 15px 0; border: 1px solid var(--win); padding: 10px; border-radius: 4px; background: rgba(255, 235, 59, 0.05); }
        .top-grid { display: flex; justify-content: space-around; text-align: center; }
        .top-box span { display: block; font-size: 1.6rem; font-weight: bold; color: var(--win); text-shadow: 0 0 8px var(--win); }

        .grid-res { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 15px; border-top: 1px solid #222; padding-top: 10px; }
        .box { border: 1px solid var(--neon); padding: 10px; text-align: center; font-weight: bold; font-size: 1rem; height: 45px; display: flex; align-items: center; justify-content: center; }
        .hot { background: var(--neon); color: var(--dark); }

        /* MODALES Y PANELES */
        #modal-db, #panel-admin { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .modal-body { max-width: 500px; margin: auto; border: 1px solid var(--neon); padding: 15px; background: var(--dark); }
        .grid-cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; font-size: 0.6rem; text-align: center; }
        .day { border: 1px solid #222; padding: 4px; background: #000; min-height: 55px; }
        .day input { font-size: 0.8rem; padding: 2px; border:none; border-bottom: 1px solid #333; background:transparent; color:var(--win); width:90%; text-align:center;}
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.8rem; }
        th, td { border: 1px solid var(--neon); padding: 8px; text-align: center; }
        .status-active { color: var(--neon); }
        .status-pending { color: var(--win); }
    </style>
</head>
<body>

<div id="view-login" class="container">
    <h2>Control de Acceso de Usuarios</h2>
    <div class="login-form">
        <input type="text" id="login-user" placeholder="USUARIO (Nombre_Apellido)">
        <input type="password" id="login-pass" placeholder="CONTRASEÑA">
        <button onclick="intentarLogin()">ENTRAR AL SISTEMA</button>
        <button class="secondary" onclick="mostrarRegistro()">SOLICITAR NUEVO REGISTRO</button>
    </div>
    <p id="login-error" style="color:var(--error); text-align:center; font-size:0.8rem; display:none;"></p>
</div>

<div id="view-register" class="container" style="display:none;">
    <h2>Solicitud de Inscripción (Cupos)</h2>
    <div class="login-form">
        <input type="text" id="reg-nombre" placeholder="NOMBRE">
        <input type="text" id="reg-apellido" placeholder="APELLIDO">
        <input type="password" id="reg-pass" placeholder="CREA TU CONTRASEÑA">
        <button onclick="enviarSolicitud()">ENVIAR SOLICITUD A REVISIÓN</button>
        <button class="secondary" onclick="mostrarLogin()">VOLVER AL INICIO</button>
    </div>
</div>

<div id="view-app" class="container" style="display:none;">
    <div style="display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--win); margin-bottom: 5px;">
        <span id="user-display">Usuario: --</span>
        <span id="expire-display">Expira en: -- días</span>
    </div>
    <h2>Probabilidades e Inteligencia</h2>
    <div class="grid-2">
        <input type="number" id="fijo_base" placeholder="FIJO" maxlength="2">
        <select id="cant_final"></select>
    </div>
    <button style="margin-top:10px;" onclick="generarTodo()">Analizar y Generar Jugada</button>

    <div id="display_resultados" style="display:none;">
        <div class="top-section">
            <div style="font-size:0.7rem; color:var(--win); text-align:center; margin-bottom:8px;">★ PREVISIÓN DE ALTA CERTEZA APK ★</div>
            <div class="top-grid">
                <div class="top-box"><small>Punta</small><span id="c1">--</span></div>
                <div class="top-box"><small>Terminal</small><span id="c2">--</span></div>
                <div class="top-box"><small>Atrasado</small><span id="c3">--</span></div>
            </div>
        </div>
        <div id="panel_res" class="grid-res"></div>
    </div>
    <button style="background:transparent; color:#666; border:1px solid #222; width:100%; padding:8px; margin-top:15px; font-size:0.7rem; cursor:pointer;" onclick="abrirConfig()">📂 Abrir Históricos y Calendario</button>
    <button class="secondary" style="padding:8px; font-size:0.7rem;" onclick="cerrarSesion()">CERRAR SESIÓN</button>
</div>

<div id="panel-admin">
    <div class="modal-body">
        <h2>Panel Maestro del Administrador</h2>
        <div id="admin-stats" style="font-size:0.8rem; text-align:center; margin-bottom:10px;"></div>
        <table>
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Estado</th>
                    <th>Días Restantes</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-usuarios"></tbody>
        </table>
        <button class="secondary" style="margin-top:20px; width:100%;" onclick="cerrarAdmin()">SALIR DEL PANEL MASTER</button>
    </div>
</div>

<div id="modal-db">
    <div class="modal-body">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <button onclick="moverMes(-1)" style="background:var(--neon); border:none; padding:5px;">◀</button>
            <span id="mes_label" style="color:var(--win); font-weight:bold;"></span>
            <button onclick="moverMes(1)" style="background:var(--neon); border:none; padding:5px;">▶</button>
        </div>
        <div class="grid-cal" id="cuerpo_cal"></div>
        <button onclick="guardarDB()" style="margin-top:20px; background:var(--win); color:#000; width:100%; padding:15px; border:none; font-weight:bold;">GUARDAR HISTORIAL</button>
        <button onclick="cerrarConfig()" style="margin-top:10px; background:#333; color:#fff; width:100%; border:none; padding:10px;">CERRAR</button>
    </div>
</div>

<script>
    let fechaFoco = new Date();
    let db = JSON.parse(localStorage.getItem('bolita_master_db')) || {};
    // Base de datos local de usuarios
    let usuariosBD = JSON.parse(localStorage.getItem('bolita_users_db')) || {};
    let usuarioActivo = null;

    // CREDENCIALES DEL ADMINISTRADOR MAESTRO
    const ADMIN_USER = "admin";
    const ADMIN_PASS = "admin123"; 

    window.onload = () => {
        const select = document.getElementById('cant_final');
        for(let i=5; i<=100; i+=5) {
            let opt = document.createElement('option');
            opt.value = i; opt.innerHTML = i + " NÚMEROS";
            if(i === 50) opt.selected = true;
            select.appendChild(opt);
        }
        verificarSesionGuardada();
    };

    /* SISTEMA DE LOGICA DE ACCESOS */
    function mostrarRegistro() { document.getElementById('view-login').style.display='none'; document.getElementById('view-register').style.display='block'; }
    function mostrarLogin() { document.getElementById('view-register').style.display='none'; document.getElementById('view-login').style.display='block'; }

    function enviarSolicitud() {
        const nom = document.getElementById('reg-nombre').value.trim();
        const ape = document.getElementById('reg-apellido').value.trim();
        const pass = document.getElementById('reg-pass').value;

        if(!nom || !ape || !pass) return alert("Por favor, llena todos los campos.");
        
        let username = nom + "_" + ape;
        if(usuariosBD[username]) return alert("Este nombre de usuario ya solicitó cupo o ya existe.");

        if(Object.keys(usuariosBD).length >= 1000) return alert("Lo sentimos, se han agotado los 1000 cupos disponibles.");

        usuariosBD[username] = {
            password: pass,
            status: "pendiente",
            fechaActivacion: null
        };
        localStorage.setItem('bolita_users_db', JSON.stringify(usuariosBD));
        alert("¡Solicitud enviada con éxito! Dile al administrador que active tu cuenta.");
        mostrarLogin();
    }

    function intentarLogin() {
        const user = document.getElementById('login-user').value.trim();
        const pass = document.getElementById('login-pass').value;
        const errBox = document.getElementById('login-error');
        errBox.style.display = 'none';

        if(user === ADMIN_USER && pass === ADMIN_PASS) {
            abrirAdmin();
            return;
        }

        if(!usuariosBD[user] || usuariosBD[user].password !== pass) {
            errBox.innerText = "Usuario o contraseña incorrectos."; errBox.style.display = 'block'; return;
        }

        let datosUser = usuariosBD[user];
        if(datosUser.status === "pendiente") {
            errBox.innerText = "Tu cuenta está pendiente de aprobación por el administrador."; errBox.style.display = 'block'; return;
        }

        // Verificar caducidad de 30 días
        let díasRestantes = calcularDiasRestantes(datosUser.fechaActivacion);
        if(díasRestantes <= 0) {
            datosUser.status = "pendiente"; // Bloquear de nuevo
            localStorage.setItem('bolita_users_db', JSON.stringify(usuariosBD));
            errBox.innerText = "Tu acceso de 1 mes ha expirado. Contacta al administrador para renovar."; errBox.style.display = 'block'; return;
        }

        // Login correcto
        usuarioActivo = user;
        sessionStorage.setItem('sesion_activa', user);
        entrarAApp(díasRestantes);
    }

    function calcularDiasRestantes(fechaAct) {
        let fAct = new Date(fechaAct);
        let fHoy = new Date();
        let diferenciaTiempo = fHoy.getTime() - fAct.getTime();
        let diasPasados = Math.floor(diferenciaTiempo / (1000 * 60 * 60 * 24));
        return 30 - diasPasados;
    }

    function entrarAApp(dias) {
        document.getElementById('view-login').style.display = 'none';
        document.getElementById('view-app').style.display = 'block';
        document.getElementById('user-display').innerText = "Usuario: " + usuarioActivo;
        document.getElementById('expire-display').innerText = "Expira en: " + dias + " días";
    }

    function verificarSesionGuardada() {
        let guardada = sessionStorage.getItem('sesion_activa');
        if(guardada && usuariosBD[guardada]) {
            let dias = calcularDiasRestantes(usuariosBD[guardada].fechaActivacion);
            if(dias > 0 && usuariosBD[guardada].status === "activo") {
                usuarioActivo = guardada; entrarAApp(dias);
            }
        }
    }

    function cerrarSesion() { sessionStorage.clear(); usuarioActivo = null; location.reload(); }

    /* PANEL ADMINISTRADOR SECRETO */
    function abrirAdmin() {
        document.getElementById('panel-admin').style.display = 'block';
        const tbody = document.getElementById('tabla-usuarios');
        const stats = document.getElementById('admin-stats');
        tbody.innerHTML = "";
        
        let total = Object.keys(usuariosBD).length;
        stats.innerText = `Cupos Solicitados: ${total} / 1000`;

        for(let u in usuariosBD) {
            let uData = usuariosBD[u];
            let dias = uData.fechaActivacion ? calcularDiasRestantes(uData.fechaActivacion) : 0;
            if(dias < 0) dias = 0;

            tbody.innerHTML += `
                <tr>
                    <td><b>${u}</b></td>
                    <td class="${uData.status === 'activo' ? 'status-active' : 'status-pending'}">${uData.status.toUpperCase()}</td>
                    <td>${uData.status === 'activo' ? dias + ' días' : '---'}</td>
                    <td>
                        <button style="padding:5px; font-size:0.7rem; background:${uData.status === 'activo' ? 'var(--error)' : 'var(--neon)'}; color:#000;" 
                            onclick="conmutarUsuario('${u}')">
                            ${uData.status === 'activo' ? 'Bloquear/Reset' : 'Permitir'}
                        </button>
                    </td>
                </tr>`;
        }
    }

    function conmutarUsuario(u) {
        if(usuariosBD[u].status === "pendiente") {
            usuariosBD[u].status = "activo";
            usuariosBD[u].fechaActivacion = new Date().toISOString();
        } else {
            usuariosBD[u].status = "pendiente";
            usuariosBD[u].fechaActivacion = null;
        }
        localStorage.setItem('bolita_users_db', JSON.stringify(usuariosBD));
        abrirAdmin();
    }
    function cerrarAdmin() { document.getElementById('panel-admin').style.display = 'none'; }

    /* GESTIÓN DE CONFIGURACIÓN DEL CALENDARIO OCULTO */
    function abrirConfig() { document.getElementById('modal-db').style.display='block'; renderCal(); }
    function cerrarConfig() { document.getElementById('modal-db').style.display='none'; }

    function renderCal() {
        const y = fechaFoco.getFullYear(), m = fechaFoco.getMonth();
        const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        document.getElementById('mes_label').innerText = `${meses[m]} ${y}`;
        const primerDia = new Date(y, m, 1).getDay();
        const ultimoDia = new Date(y, m + 1, 0).getDate();
        const contenedor = document.getElementById('cuerpo_cal');
        contenedor.innerHTML = "";
        for(let i=0; i<primerDia; i++) contenedor.innerHTML += `<div></div>`;
        for(let d=1; d<=ultimoDia; d++) {
            const id = `${y}-${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
            contenedor.innerHTML += `<div class="day">${d}<br>
                <input type="text" id="T-${id}" value="${db[id]?.t || ''}" maxlength="2">
                <input type="text" id="N-${id}" value="${db[id]?.n || ''}" maxlength="2">
            </div>`;
        }
    }

    function moverMes(n) { fechaFoco.setMonth(fechaFoco.getMonth() + n); renderCal(); }

    function guardarDB() {
        document.querySelectorAll('.day input').forEach(i => {
            const [turno, fecha] = i.id.split('-');
            if(i.value) {
                if(!db[fecha]) db[fecha] = {};
                db[fecha][turno === 'T' ? 't' : 'n'] = i.value.padStart(2, '0');
            }
        });
        localStorage.setItem('bolita_master_db', JSON.stringify(db));
        cerrarConfig();
    }

    /* MOTOR MATEMÁTICO SIN NÚMEROS REPETIDOS */
    function generarTodo() {
        const val = document.getElementById('fijo_base').value;
        if(!val) return alert("Ingresa el último fijo");
        
        const cantRequerida = parseInt(document.getElementById('cant_final').value);
        let arrayDiferentes = []; // Cambiamos a array controlado para forzar elementos únicos
        let f = val.padStart(2, '0');

        // 1. LOS 3 CERTEROS ORIGINALES
        let p = f, punta = "";
        while(p.length > 1) {
            let n = "";
            for(let i=0; i<p.length-1; i++) n += (parseInt(p[i]) + parseInt(p[i+1])) % 10;
            punta = n.slice(-2).padStart(2, '0');
            p = n;
        }
        let c2 = ((parseInt(f[0])+5)%10).toString() + ((parseInt(f[1])+5)%10).toString();
        
        let todosLosSalidores = Object.values(db).flatMap(o => Object.values(o));
        let numAtrasado = "00"; 
        for(let i=0; i<100; i++) {
            let nBusqueda = i.toString().padStart(2,'0');
            if(!todosLosSalidores.includes(nBusqueda)) { numAtrasado = nBusqueda; break; }
        }

        document.getElementById('c1').innerText = punta;
        document.getElementById('c2').innerText = t1 = c2;
        document.getElementById('c3').innerText = numAtrasado;

        // Añadir los certeros asegurando que no se repitan entre ellos
        if(!arrayDiferentes.includes(punta)) arrayDiferentes.push(punta);
        if(!arrayDiferentes.includes(c2)) arrayDiferentes.push(c2);
        if(!arrayDiferentes.includes(numAtrasado)) arrayDiferentes.push(numAtrasado);

        // 2. BUCLE FILTRADO - EVITA REPETICIONES TOTALES
        const recientes = todosLosSalidores.slice(-15); 
        let semilla = parseInt(val) + new Date().getDate();
        let resguardo = 0;

        // El bucle SOLO avanza si el número generado NO existe en arrayDiferentes
        while(arrayDiferentes.length < cantRequerida && resguardo < 5000) {
            resguardo++;
            semilla = (semilla * 23 + 17) % 100; // Multiplicador ampliado para mayor dispersión
            let candidato = semilla.toString().padStart(2, '0');
            
            // Regla estricta: No debe existir en la lista actual
            if(!arrayDiferentes.includes(candidato)) {
                // Filtro secundario: evitar los que salieron en los últimos 15 días en el calendario
                if(!recientes.includes(candidato) || resguardo > 1500) {
                    arrayDiferentes.push(candidato);
                }
            }
        }

        // Si por dispersión faltaran números para la cantidad exacta, metemos de forma secuencial únicos
        let aux = 0;
        while(arrayDiferentes.length < cantRequerida) {
            let relleno = aux.toString().padStart(2, '0');
            if(!arrayDiferentes.includes(relleno)) {
                arrayDiferentes.push(relleno);
            }
            aux++;
        }

        // 3. RENDERIZADO IMPLACABLE DE NÚMEROS ÚNICOS
        document.getElementById('display_resultados').style.display = 'block';
        const panel = document.getElementById('panel_res');
        panel.innerHTML = "";
        
        for(let i=0; i < cantRequerida; i++) {
            const clase = i < 10 ? 'box hot' : 'box';
            panel.innerHTML += `<div class="${clase}">${arrayDiferentes[i]}</div>`;
        }
    }
</script>
</body>
</html>
